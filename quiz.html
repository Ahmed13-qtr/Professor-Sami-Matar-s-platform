<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الرياضيات | أ/ سامي يوسف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #1a4a72;
            --accent-color: #e67e22;
            --bg-color: #f4f7f6;
            --success-color: #27ae60;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            padding: 20px;
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* رأس الاختبار */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .timer {
            background: #ff7675;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* السؤال */
        .question-box h2 {
            font-size: 20px;
            color: var(--main-color);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* الاختيارات */
        .options-list {
            list-style: none;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #eee;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .option:hover {
            border-color: var(--main-color);
            background: #eef5ff;
        }

        .option input {
            margin-left: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }

        /* أزرار التحكم */
        .quiz-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-next {
            background: var(--main-color);
            color: white;
        }

        .btn-prev {
            background: #ddd;
            color: #333;
        }

        .btn:hover { opacity: 0.9; }

        /* شريط التقدم */
        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success-color);
            width: 30%; /* يتم تغييرها حسب رقم السؤال */
            transition: 0.5s;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="quiz-header">
            <div>
                <h3>اختبار: معادلات الدرجة الثانية</h3>
                <p style="font-size: 12px; color: #888;">سؤال 1 من 10</p>
            </div>
            <div class="timer">الوقت المتبقي: 14:59</div>
        </div>

        <div class="progress-bar-container">
            <div class="progress-fill"></div>
        </div>

        <div class="question-box">
            <h2>السؤال الأول: إذا كان جذرا المعادلة $x^2 - 5x + 6 = 0$ هما $L, M$.. فإن قيمة $L + M$ تساوي؟</h2>
            
            <ul class="options-list">
                <li class="option">
                    <input type="radio" name="q1" id="opt1">
                    <label for="opt1">5</label>
                </li>
                <li class="option">
                    <input type="radio" name="q1" id="opt2">
                    <label for="opt2">6</label>
                </li>
                <li class="option">
                    <input type="radio" name="q1" id="opt3">
                    <label for="opt3">-5</label>
                </li>
                <li class="option">
                    <input type="radio" name="q1" id="opt4">
                    <label for="opt4">1</label>
                </li>
            </ul>
        </div>

        <div class="quiz-footer">
            <button class="btn btn-prev" onclick="window.history.back()">السابق</button>
            <button class="btn btn-next" onclick="alert('تم حفظ الإجابة، جاري الانتقال للسؤال التالي...')">السؤال التالي</button>
        </div>
    </div>

</body>
</html>
